spring:
  application:
    name: BudgetBook

  datasource:
    url: jdbc:postgresql://localhost:5432/budget_book_db
    username: budget_book_user
    password: budget_book_pass
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.BudgetBook.infrastructure.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

logging:
  level:
    com.example.BudgetBook: DEBUG
    org.mybatis: DEBUG  # 開発中はSQLログを見たい場合
    org.flywaydb: INFO